<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
    <div class="container">
    <h1 class="title">Đăng nhập</h1>
    <p class="subtitle">Đăng nhập tài khoản để sử dụng hệ thống quản lý.</p>

    <form id="loginForm">
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" class="input" placeholder="Nhập email của bạn">
            <span class="error-message" id="emailError"></span>
        </div>

        <div class="field">
            <label>Mật khẩu</label>
            <input type="password" id="password" class="input" placeholder="Nhập mật khẩu">
            <span class="error-message" id="passwordError"></span>
        </div>

        <div class="options">
            <div class="remember">
                <input type="checkbox">
                <span>Nhớ tài khoản</span>
            </div>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn">Đăng nhập</button>
    </form>

    <p class="register">
        Bạn chưa có tài khoản? 
        <a href="./register.html">Đăng ký</a>
    </p>
</div>
    <script src="../js/login.js"></script>
</body>
</html>
