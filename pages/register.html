<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css" />
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>Đăng ký tài khoản</h1>
            <p>Đăng ký tài khoản để sử dụng dịch vụ</p>
        </div>

        <form id="registerForm" class="form">
            <div class="row">
                <div class="field">
                    <label>Họ và tên</label>
                    <input type="text" id="fullname" placeholder="Nhập họ và tên">
                    <span class="error-message" id="fullnameError"></span>
                </div>
            </div>

            <div class="field">
                <label>Email</label>
                <input type="text" id="email" placeholder="you@company.com">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="field">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Tối thiểu 8 ký tự">
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="field">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <div class="checkbox-wrapper">
                <div class="checkbox">
                    <input type="checkbox" id="agreeTerms">
                    <span>Bạn đồng ý với <a href="#">chính sách và điều khoản</a></span>
                </div>
                <span class="error-message" id="termsError"></span>
            </div>

            <button type="submit" class="btn">Đăng ký</button>

            <p class="login">
                Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a>
            </p>
        </form>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="../js/register.js"></script>
</body>
</html>
