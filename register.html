<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css" />
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>Đăng ký tài khoản</h1>
            <p>Đăng ký tài khoản để sử dụng dịch vụ</p>
        </div>

        <div class="form">
            <div class="row">
            <div class="field">
                <label>Họ và tên đệm</label>
                <input type="text">
            </div>
            <div class="field">
                <label>Tên</label>
                <input type="text">
            </div>
        </div>

        <div class="field">
        <label>Email</label>
        <input type="text" placeholder="you@company.com">
        </div>

        <div class="field">
        <label>Mật khẩu</label>
        <input type="password">
        </div>

        <div class="checkbox">
        <input type="checkbox">
        <span>Bạn đồng ý với <a href="#">chính sách và điều khoản</a></span>
        </div>

        <button class="btn">Đăng ký</button>

        <p class="login">
        Bạn đã có tài khoản? <a href="#">Đăng nhập</a>
        </p>
    </div>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
